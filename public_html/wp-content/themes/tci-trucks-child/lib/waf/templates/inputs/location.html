
{{#if textarea}}
    <textarea name="{{name}}" type="text" placeholder="{{placeholder}}"
        class="location-input form-control {{inputClass}}">{{value}}</textarea> 
{{/if}} 

{{#unless textarea}} 
    <div class="input-group locate-group">
        <input
            type="text" name="{{nameAttr}}" autocomplete="off" placeholder="{{placeholder}}"
            class="location-input form-control {{inputClass}}" value="{{value}}">
        <div class="input-group-append">
            <a class="clear" href="#">
                <i class="la la-close"></i>
            </a>
            <span class="input-group-text bg-primary text-white mb-0">
                <a class="locate text-white" href="#">
                    <i class="fa fa-crosshairs text-white"></i>
                </a>
            </span>
        </div>
    </div>
{{/unless}}
<div class="location-group">
</div>

{{#if map}} 
<div class="input-map"
        style="height:300px;"></div>
    <div class="infowindow-content">
        <span class="place-name" class="title"></span><br>
        <span class="place-address"></span>
    </div> 
{{/if}}
