{{{message}}}
<div class="d-flex justify-content-center mt-4 mb-0">
    <button type="submit" class="yes btn btn-success mx-2 mb-0" data-value="true"> {{confirm}} {{#unless confirm}} Yes {{/unless}} </button>
    <!-- <span class="key-nav">Y</span> --> 
    <a href="{{url}}"
        class="no btn btn-danger mx-2 mb-0"
        data-value="false"> {{reject}} {{#unless reject}}
        No {{/unless}} 
    </a> 
    
</div>
