<table class="form-table">
    <tbody class="bd {{bdClass}}" data-index="0">
        <tr>
            <td colspan=2>
                <fieldset {{#if id}}id="{{id}}" {{/if}} class="clearfix fieldset {{class}} {{name}}" name="{{name}}"
                    {{{dataAttr}}}>
                    {{#if legend}}
                        <label>{{{legend}}}</label>
                    {{/if}}
                    {{#if desc}}
                        <span class="desc">{{{desc}}}</span>
                    {{/if}}
                    {{> fields}}
                </fieldset>
            </td>
        </tr>
    </tbody>
</table>
