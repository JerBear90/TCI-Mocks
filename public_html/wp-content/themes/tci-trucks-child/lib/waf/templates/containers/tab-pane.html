	<div class="{{bdClass}} bd">
		{{#if desc}}
			<span class="desc">{{{desc}}}</span>
		{{/if}}

		{{> fields}}

		<div class="append">
			{{#if append}}
				{{{append}}}
			{{/if}}
		</div>
	</div>
</div>
